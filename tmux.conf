set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
set -g destroy-unattached off
set -g detach-on-destroy on
set -g history-limit 200000
set -g mouse off
set -g base-index 1
set -g renumber-windows on

set -g default-terminal "screen-256color"
set -g default-shell ${HOME}/zsh

set -g display-panes-active-colour red
set -g display-panes-colour blue

set -g focus-events on

set -g status on
set -g status-bg colour237
set -g status-fg colour223
set -g window-style 'fg=default,bg=terminal'
# set -g window-style 'fg=default,bg=#000000'
set -g window-active-style 'fg=default,bg=terminal'
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour240'
set -g window-status-style 'fg=colour245,bg=colour237'
set -g window-status-current-style 'fg=colour234,bg=colour223,bold'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
